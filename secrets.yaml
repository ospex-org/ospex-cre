# CRE secret name -> env var(s) that supply the value.
# Simulation reads the value from the matching env var in ospex-cre/.env (or the shell env);
# deployment uploads it to the Vault DON via `cre secrets create`.
# NOTE: a CLI bug collides when an env var name is a prefix/substring of a secret name —
# suffix the env var if that happens (e.g. RAPIDAPI_KEY_VAR).
secretsNames:
  RAPIDAPI_KEY:
    - RAPIDAPI_KEY
  JSONODDS_KEY:
    - JSONODDS_KEY
